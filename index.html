<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildDex</title>
<style>
  body { font-family: sans-serif; margin:0; padding:0; background:#f0f0f0; }
  .header, .controls { padding: 1em; background:#fff; display:flex; gap:1em; flex-wrap:wrap; align-items:center; }
  #collection { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1em; padding:1em; }
  .card { background:#fff; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); cursor:pointer; overflow:hidden; transition:transform 0.2s; }
  .card:hover { transform:scale(1.05); }
  .card img { width:100%; height:120px; object-fit:cover; }
  .card-body { padding:0.5em; }
  .rarity { font-weight:bold; padding:0.2em 0; text-align:center; }
  .footer { display:flex; justify-content:space-between; font-size:0.8em; padding-top:0.3em; }
  .badge { display:inline-block; background:#ffd700; color:#000; padding:0.2em 0.5em; margin:0.2em; border-radius:4px; }
  #animalModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
  #animalModal .modal-content { background:#fff; padding:1em; border-radius:8px; max-width:400px; width:90%; text-align:center; position:relative; }
  .close { position:absolute; top:0.5em; right:0.5em; cursor:pointer; font-weight:bold; }
  .controls input, .controls select { padding:0.3em; font-size:1em; }
  #logMessage { margin-left:1em; font-weight:bold; }
  .stats-container { padding:1em; display:flex; gap:1em; flex-wrap:wrap; }
</style>
</head>
<body>

<div class="header">
  <input type="text" id="animalInput" placeholder="Enter animal name" list="animals">
  <button onclick="logAnimal()">Log Animal</button>
  <span id="logMessage"></span>
  <datalist id="animals"></datalist>
</div>

<div class="controls">
  <input type="text" id="searchBox" placeholder="Search..." oninput="renderCollection()">
  <select id="filterElement" onchange="renderCollection()">
    <option value="all">All Types</option>
    <option value="fire">Fire</option>
    <option value="water">Water</option>
    <option value="grass">Grass</option>
    <option value="ice">Ice</option>
    <option value="flying">Flying</option>
    <option value="dark">Dark</option>
    <option value="poison">Poison</option>
    <option value="bug">Bug</option>
    <option value="electric">Electric</option>
  </select>
  <select id="filterHabitat" onchange="renderCollection()">
    <option value="all">All Habitats</option>
    <option value="forest">Forest</option>
    <option value="grassland">Grassland</option>
    <option value="mountain">Mountain</option>
    <option value="freshwater">Freshwater</option>
    <option value="ocean">Ocean</option>
    <option value="urban">Urban</option>
    <option value="wetland">Wetland</option>
    <option value="desert">Desert</option>
    <option value="polar">Polar</option>
    <option value="rainforest">Rainforest</option>
  </select>
</div>

<div class="stats-container">
  <span id="xpDisplay"></span>
  <span id="statTotal"></span>
  <span id="statRare"></span>
  <span id="statHabitats"></span>
  <span id="statContinents"></span>
</div>

<div id="badgeArea"></div>

<div id="collection"></div>

<!-- Modal -->
<div id="animalModal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="modalName"></h2>
    <img id="modalImg" src="" alt="" style="width:100%; height:auto; border-radius:8px;">
    <p id="modalScientific"></p>
    <p id="modalMove"></p>
    <p id="modalStats"></p>
    <p id="modalType"></p>
    <p id="modalContinent"></p>
    <p id="modalHabitat"></p>
    <p id="modalDate"></p>
    <button onclick="releaseAnimal()">Release Animal</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
